apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deployment
  labels:
    app: fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
      - name: fastapi-container
        # IMPORTANT: Change this to your actual Docker Hub username!
        # Change the v1 to v2 here: as we are rolling out v2 of our app with the new Ingress configuration
        image: neyo55/fastapi-app:v2
        ports:
        - containerPort: 8000
